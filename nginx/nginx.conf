events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Optimization
    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers (Global)
    # HSTS (Enable this if you have SSL certs configured, otherwise it might break http access)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Anti-Clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # XSS Protection
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP)
    # Adjust 'script-src' to allow specific domains (e.g., Google Analytics, Maps)
    # 'unsafe-inline' is often needed for Styled-components / Next.js hydration, but try to minimize it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.google.com https://*.googleapis.com https://*.gstatic.com blob:; font-src 'self' https://fonts.gstatic.com data:; frame-src 'self' https://*.google.com;" always;

    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Handle the basePath if necessary (e.g. /belaweb2test)
        # If the export has the folder structure built-in, this just works.
        
        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # For SPA routing (if using dynamic routes behind the scenes or optional catch-alls)
        # Since this is static export, '404.html' is the fallback.
        error_page 404 /404.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
